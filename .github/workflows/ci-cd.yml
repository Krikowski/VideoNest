name: VideoNest CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: "8.0.x"
  PROJECT_PATH: "VideoNest/VideoNest.csproj"
  TEST_PROJECT_PATH: "VideoNest.UnitTests/VideoNest.UnitTests.csproj"
  IMAGE_NAME: ghcr.io/krikowski/videonest-api

jobs:
  ci:
    name: CI - Build, Test and Publish Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET with NuGet cache
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/*.csproj

      - name: Restore API
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Restore tests
        run: dotnet restore ${{ env.TEST_PROJECT_PATH }}

      - name: Build API
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Build tests
        run: dotnet build ${{ env.TEST_PROJECT_PATH }} --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ${{ env.TEST_PROJECT_PATH }} --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: videonest-test-results
          path: "**/TestResults/*.trx"
          retention-days: 7

      - name: Publish API
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ./publish

      - name: Upload published artifact
        uses: actions/upload-artifact@v4
        with:
          name: videonest-api-${{ github.run_number }}
          path: ./publish
          retention-days: 14

  docker:
    name: CD - Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./VideoNest
          file: ./VideoNest/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}