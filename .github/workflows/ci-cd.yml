name: VideoNest CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: "8.0.x"
  PROJECT_PATH: "VideoNest/VideoNest.csproj"
  TEST_PROJECT_PATH: "VideoNest.UnitTests/VideoNest.UnitTests.csproj"

jobs:
  ci:
    name: CI - Build, Test and Publish Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET with NuGet cache
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/*.csproj

      - name: Restore API
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Restore tests
        run: dotnet restore ${{ env.TEST_PROJECT_PATH }}

      - name: Build API
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Build tests
        run: dotnet build ${{ env.TEST_PROJECT_PATH }} --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ${{ env.TEST_PROJECT_PATH }} --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: videonest-test-results
          path: "**/TestResults/*.trx"
          retention-days: 7

      - name: Publish API
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ./publish

      - name: Upload published artifact
        uses: actions/upload-artifact@v4
        with:
          name: videonest-api
          path: ./publish
          retention-days: 14

  cd-iis:
    name: CD - Deploy to Local IIS
    runs-on: [self-hosted, Windows, X64, iis, local]
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download published artifact
        uses: actions/download-artifact@v4
        with:
          name: videonest-api
          path: C:\actions\videonest-api

      - name: Stop IIS site and app pool
        shell: powershell
        run: |
          Import-Module WebAdministration

          $site = Get-Website -Name "VideoNest" -ErrorAction Stop

          if ($site.State -eq "Started") {
            Stop-WebSite -Name "VideoNest"
          }

          if ((Get-WebAppPoolState -Name "VideoNestPool").Value -ne "Stopped") {
            Stop-WebAppPool -Name "VideoNestPool"
          }

          Start-Sleep -Seconds 8

      - name: Clean deploy folder
        shell: powershell
        run: |
          if (!(Test-Path "C:\deploy\videonest")) {
            New-Item -ItemType Directory -Path "C:\deploy\videonest" -Force
          }

          Remove-Item "C:\deploy\videonest\*" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Deploy files to IIS folder
        shell: powershell
        run: |
          Copy-Item "C:\actions\videonest-api\*" "C:\deploy\videonest" -Recurse -Force

      - name: Create logs folder
        shell: powershell
        run: |
          if (!(Test-Path "C:\deploy\videonest\logs")) {
            New-Item -ItemType Directory -Path "C:\deploy\videonest\logs" -Force
          }

      - name: Configure web.config for IIS
        shell: powershell
        run: |
          $webConfigPath = "C:\deploy\videonest\web.config"

          if (!(Test-Path $webConfigPath)) {
            throw "web.config não encontrado em $webConfigPath"
          }

          [xml]$xml = Get-Content $webConfigPath

          $aspNetCore = $xml.configuration.location.'system.webServer'.aspNetCore

          if ($null -eq $aspNetCore) {
            throw "Nó aspNetCore não encontrado no web.config"
          }

          $aspNetCore.SetAttribute("stdoutLogEnabled", "true")
          $aspNetCore.SetAttribute("stdoutLogFile", ".\logs\stdout")

          if ($null -eq $aspNetCore.environmentVariables) {
            $environmentVariables = $xml.CreateElement("environmentVariables")
            $aspNetCore.AppendChild($environmentVariables) | Out-Null
          }

          $existing = $aspNetCore.environmentVariables.environmentVariable | Where-Object {
            $_.name -eq "ASPNETCORE_ENVIRONMENT"
          }

          if ($null -eq $existing) {
            $envVar = $xml.CreateElement("environmentVariable")
            $envVar.SetAttribute("name", "ASPNETCORE_ENVIRONMENT")
            $envVar.SetAttribute("value", "Demo")
            $aspNetCore.environmentVariables.AppendChild($envVar) | Out-Null
          } else {
            $existing.SetAttribute("value", "Demo")
          }

          $xml.Save($webConfigPath)

          Write-Host "web.config configurado para ASPNETCORE_ENVIRONMENT=Demo"
          Get-Content $webConfigPath

      - name: Grant IIS AppPool permissions
        shell: powershell
        run: |
          icacls "C:\deploy\videonest" /grant "IIS AppPool\VideoNestPool:(OI)(CI)(M)" /T

      - name: Start IIS app pool and site
        shell: powershell
        run: |
          Import-Module WebAdministration

          Start-WebAppPool -Name "VideoNestPool"
          Start-WebSite -Name "VideoNest"

      - name: Health check and IIS diagnostics
        shell: powershell
        run: |
          Start-Sleep -Seconds 10

          Write-Host "==== IIS Site Status ===="
          Import-Module WebAdministration
          Get-Website -Name "VideoNest" | Format-List *

          Write-Host "==== IIS AppPool Status ===="
          Get-WebAppPoolState -Name "VideoNestPool"

          Write-Host "==== Deploy Folder Files ===="
          Get-ChildItem "C:\deploy\videonest" | Select-Object Name, Length, LastWriteTime

          Write-Host "==== Web.config ===="
          Get-Content "C:\deploy\videonest\web.config"

          Write-Host "==== Testing URLs ===="

          $urls = @(
            "http://localhost:5002/",
            "http://localhost:5002/health",
            "http://localhost:5002/swagger/index.html",
            "http://localhost:5002/index.html"
          )

          foreach ($url in $urls) {
            try {
              Write-Host "Testing $url"
              $response = Invoke-WebRequest -Uri $url -UseBasicParsing -ErrorAction Stop
              Write-Host "OK $url - Status: $($response.StatusCode)"
              exit 0
            } catch {
              Write-Host "FAILED $url"
              Write-Host $_.Exception.Message

              if ($_.Exception.Response) {
                Write-Host "StatusCode:" $_.Exception.Response.StatusCode.value__
              }
            }
          }

          Write-Host "==== Recent stdout logs ===="
          if (Test-Path "C:\deploy\videonest\logs") {
            Get-ChildItem "C:\deploy\videonest\logs" -File |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 3 |
              ForEach-Object {
                Write-Host "---- $($_.FullName) ----"
                Get-Content $_.FullName -Tail 80
              }
          }

          throw "Health check failed. Application did not return HTTP 200."