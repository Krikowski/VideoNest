name: VideoNest CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci-cd:
    runs-on: [self-hosted, Windows, X64, iis, local]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List repository files
        shell: powershell
        run: |
          Get-ChildItem -Recurse -Depth 3

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ./VideoNest/VideoNest.csproj

      - name: Build
        run: dotnet build ./VideoNest/VideoNest.csproj -c Release --no-restore

      - name: Test
        run: dotnet test ./VideoNest/VideoNest.csproj -c Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish ./VideoNest/VideoNest.csproj -c Release -o ./publish --no-build

      - name: Stop IIS site
        shell: powershell
        run: |
          Import-Module WebAdministration
          if ((Get-Website -Name "VideoNest").State -eq "Started") {
            Stop-WebSite -Name "VideoNest"
          }

      - name: Clean deploy folder
        shell: powershell
        run: |
          if (!(Test-Path "C:\deploy\videonest")) {
            New-Item -ItemType Directory -Path "C:\deploy\videonest"
          }

          Remove-Item "C:\deploy\videonest\*" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Deploy files
        shell: powershell
        run: |
          Copy-Item ".\publish\*" "C:\deploy\videonest" -Recurse -Force

      - name: Create logs folder
        shell: powershell
        run: |
          if (!(Test-Path "C:\deploy\videonest\logs")) {
            New-Item -ItemType Directory -Path "C:\deploy\videonest\logs"
          }

      - name: Grant IIS permissions
        shell: powershell
        run: |
          icacls "C:\deploy\videonest" /grant "IIS AppPool\VideoNestPool:(OI)(CI)(M)" /T

      - name: Start IIS site
        shell: powershell
        run: |
          Import-Module WebAdministration
          Start-WebSite -Name "VideoNest"

      - name: Health check
        shell: powershell
        run: |
          Start-Sleep -Seconds 5
          Invoke-WebRequest -Uri "http://localhost:5002/" -UseBasicParsing